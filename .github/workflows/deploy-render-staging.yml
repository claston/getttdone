name: CD | Deploy to Render (Staging)

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CD | Publish Container (GHCR)
    types:
      - completed

concurrency:
  group: deploy-render-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  db-migrate-staging:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run Alembic migrations (staging)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SCHEMA: ${{ vars.DATABASE_SCHEMA }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::notice::Skipping DB migration because DATABASE_URL is not configured in staging environment secrets."
            exit 0
          fi
          export DATABASE_SCHEMA="${DATABASE_SCHEMA:-public}"
          python -m alembic upgrade head

  deploy-render-staging:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    needs:
      - db-migrate-staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Trigger deploy on Render
        env:
          RENDER_DEPLOY_ENABLED: ${{ vars.RENDER_DEPLOY_ENABLED }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
        run: |
          set -euo pipefail

          deploy_enabled="$(printf '%s' "${RENDER_DEPLOY_ENABLED:-true}" | tr '[:upper:]' '[:lower:]')"
          if [ "${deploy_enabled}" != "1" ] && [ "${deploy_enabled}" != "true" ] && [ "${deploy_enabled}" != "yes" ] && [ "${deploy_enabled}" != "on" ]; then
            echo "::notice::Skipping Render deploy because RENDER_DEPLOY_ENABLED is not true."
            exit 0
          fi

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "::notice::Skipping Render deploy because RENDER_API_KEY or RENDER_STAGING_SERVICE_ID is not configured."
            exit 0
          fi

          response_file=$(mktemp)
          http_status_file=$(mktemp)

          curl -sS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            -o "${response_file}" \
            -w "%{http_code}" > "${http_status_file}"

          export RESPONSE_FILE="${response_file}"
          export RESPONSE_HTTP_STATUS="$(cat "${http_status_file}")"
          python - <<'PY'
          import json
          import os
          import sys

          response_path = os.environ["RESPONSE_FILE"]
          response_http_status = str(os.environ.get("RESPONSE_HTTP_STATUS") or "").strip()
          expected_service_id = os.environ["RENDER_SERVICE_ID"]
          try:
              status_code = int(response_http_status)
          except ValueError:
              print("::error::Render API did not return a valid HTTP status code.")
              print(f"Raw status: {response_http_status!r}")
              sys.exit(1)

          if status_code < 200 or status_code >= 300:
              print("::error::Render deploy request failed.")
              print(f"HTTP status: {status_code}")
              try:
                  with open(response_path, "r", encoding="utf-8") as response_stream:
                      body_preview = response_stream.read(2000)
              except OSError:
                  body_preview = ""
              if body_preview:
                  print(body_preview)
              sys.exit(1)

          with open(response_path, "r", encoding="utf-8") as response_stream:
              raw_body = response_stream.read().strip()

          if not raw_body:
              print(
                  "::warning::Render API response body was empty; "
                  "continuing because request succeeded."
              )
              print(
                  "::notice::Render deploy request accepted "
                  "(deploy_id=n/a, service_id=n/a, status=n/a)."
              )
              sys.exit(0)

          try:
              payload = json.loads(raw_body)
          except json.JSONDecodeError:
              print("::error::Render API returned invalid JSON response.")
              print(raw_body[:2000])
              sys.exit(1)

          deploy_id = str(payload.get("id") or "").strip()
          service_id = str(
              payload.get("serviceId")
              or payload.get("service", {}).get("id")
              or ""
          ).strip()
          status = str(payload.get("status") or "").strip()

          if not deploy_id:
              print("::error::Render API response missing deploy id.")
              print(json.dumps(payload)[:2000])
              sys.exit(1)

          if service_id and service_id != expected_service_id:
              print(
                  "::error::Render API response service id does not match "
                  "RENDER_STAGING_SERVICE_ID."
              )
              print(
                  f"Expected service id: {expected_service_id}; "
                  f"response service id: {service_id}"
              )
              sys.exit(1)

          if not service_id:
              print(
                  "::warning::Render API response did not include service id; "
                  "continuing because deploy id was returned."
              )

          print(
              "::notice::Render deploy request accepted "
              f"(deploy_id={deploy_id}, "
              f"service_id={service_id or 'n/a'}, status={status or 'n/a'})."
          )
          PY
