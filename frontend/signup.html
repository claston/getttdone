<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFX Simples | Criar conta</title>
  <link rel="stylesheet" href="./auth.css" />
</head>
<body>
  <nav class="top-nav-shell glass-header" aria-label="Navegacao principal">
    <div class="top-nav-inner">
      <a class="top-brand" href="./ofx-convert.html">OFX Simples</a>
      <div class="top-nav-links">
        <a href="./ofx-convert.html">Conversor</a>
        <a href="./login.html?next=%2Fofx-convert.html">Entrar</a>
      </div>
      <div class="top-auth-actions">
        <a id="top-login-link" class="top-auth-link" href="./login.html?next=%2Fofx-convert.html">Entrar</a>
        <a class="top-auth-btn primary-gradient-cta" href="./signup.html?next=%2Fofx-convert.html" aria-current="page">Criar conta</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="auth-shell">
      <header class="brand hidden-on-nav">
        <div class="brand-icon">$</div>
        <h1>OFX Simples</h1>
      </header>

      <article class="card">
        <div class="card-head">
          <h2>Crie sua conta</h2>
          <p>Não requer cartão de crédito</p>
        </div>

        <p id="status-msg" class="status"></p>

        <form id="signup-form" class="form">
          <label for="name">Nome completo</label>
          <input id="name" type="text" placeholder="John Doe" required />

          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="name@company.com" required />

          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="••••••••" required />

          <button type="submit" class="btn btn-primary">Criar conta</button>
        </form>

        <p class="footnote">Já tem uma conta? <a id="login-link" href="./login.html">Entre</a></p>
      </article>
    </section>
  </main>

  <script src="./signup.js"></script>
</body>
</html>
