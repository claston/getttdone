<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFX Simples | Area do Cliente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./client-area.css" />
</head>
<body class="client-area-page">
  <nav class="top-nav-shell glass-header" aria-label="Navegacao principal">
    <div class="top-nav-inner">
      <a href="./ofx-convert.html" class="top-brand">OFX Simples</a>
      <div class="top-nav-links">
        <a href="./ofx-convert.html">Nova conversao</a>
        <a href="./client-area.html" aria-current="page">Historico</a>
      </div>
      <div class="top-auth-actions">
        <p class="user-email" id="profile-email">-</p>
        <button id="logout-btn" class="top-auth-btn logout-btn" type="button" aria-label="Sair da conta">
          <span aria-hidden="true">Sair</span>
        </button>
      </div>
    </div>    
  </nav>

  <main class="dashboard">
    <section class="hero-action">
      <a class="cta-new" href="./ofx-convert.html">
        <span class="cta-icon" aria-hidden="true">+</span>
        <span>Nova conversao</span>
      </a>
    </section>

    <section class="history-section" aria-labelledby="history-title">
      <div class="history-header">
        <h1 id="history-title">Suas conversoes</h1>
        <div class="history-divider" aria-hidden="true"></div>
      </div>
      <p id="quota-text" class="quota-text">Cota restante: -</p>
      <p id="status-msg" class="status-msg" role="status" aria-live="polite"></p>

      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome do arquivo</th>
                <th>Data</th>
                <th>Transacoes</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="history-rows">
              <tr>
                <td colspan="4">Carregando conversoes...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="history-footer">
        <a id="view-all-link" class="view-all-link" href="./client-area.html">
          <span>Ver todas as conversoes</span>
          <span aria-hidden="true">-&gt;</span>
        </a>
      </div>
    </section>
  </main>

  <script src="./client-area.js"></script>
</body>
</html>
