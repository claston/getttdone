<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OFX Simples | Entrar</title>
  <link rel="stylesheet" href="./auth.css" />
</head>
<body>
  <nav class="top-nav-shell glass-header" aria-label="Navegacao principal">
    <div class="top-nav-inner">
      <a class="top-brand" href="./ofx-convert.html">OFX Simples</a>
      <div class="top-nav-links">
        <a href="./ofx-convert.html">Conversor</a>
        <a href="./signup.html?next=%2Fofx-convert.html">Criar conta</a>
      </div>
      <div class="top-auth-actions">
        <a id="top-signup-link" class="top-auth-link" href="./signup.html?next=%2Fofx-convert.html">Criar conta</a>
        <a class="top-auth-btn primary-gradient-cta" href="./login.html?next=%2Fofx-convert.html" aria-current="page">Entrar</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="auth-shell">
      <header class="brand hidden-on-nav">
        <div class="brand-icon">$</div>
        <h1>OFX Simples</h1>
      </header>

      <article class="card">
        <div class="card-head">
          <h2>Bem-vindo de volta</h2>
          <p>Acesse sua conta</p>
        </div>

        <p id="status-msg" class="status"></p>

        <form id="login-form" class="form">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="name@company.com" required />

          <div class="label-row">
            <label for="password">Senha</label>
          </div>
          <input id="password" type="password" placeholder="••••••••" required />

          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <p class="footnote">Não tem uma conta? <a id="signup-link" href="./signup.html">Cadastre-se</a></p>
      </article>
    </section>
  </main>

  <script src="./login.js"></script>
</body>
</html>
